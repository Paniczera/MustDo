<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <title>MustDo!</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <main class="container">
            <header id= "tituloSite">
                <h1><span id="logo">Must</span><span id="logo2">Do!</span></h1>
                <p id='fraseDoDia'></p>
                
                <div class="header-info">
                    <span id="header-data"></span>
                    <button id="botaoDark" class="botaoDark">🌙 Escuro</button>
                </div>
            </header>

            <section class="progresso">
               
                <div id="barraProgresso"></div>

            </section>

            <p id="textoProgresso"></p>
            
            <section class="filtros">
                <div class="card">
                    <div class="card-icon">📋</div> 
                    <div class="card-dados">
                        <span class="num-card" id="totalTarefas">3</span>
                        <span class="text-card">Total</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-icon">⏰</div>
                    <div class="card-dados">
                        <span class="num-card" id="pendenteTarefas">3</span>
                        <span class="text-card">Pendentes</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-icon">✅</div>
                    <div class="card-dados">
                    <span class="num-card" id="concluidaTarefas">0</span>
                    <span class="text-card">Concluídas</span>
                </div>
            </section>
            

            <section class="area-geral">
                <div class="area-adicionar">
                    <input type="text"  id="inputTarefa" placeholder="Adicionar nova tarefa...">
                    <button id="botao">+ Adicionar</button>
                </div>

                <div class="card">
                    <button class="btn-filtro ativo" data-filtro="todas">Todos</button>
                    <button class="btn-filtro" data-filtro="pendentes">Pendentes</button>
                    <button class="btn-filtro" data-filtro="concluidas">Concluídas</button>

                </div>
                
                <br>

                <ul id="lista"></ul>

                <div class="area-limpar" style="text-align: center; margin-bottom: 20px;">
                    <button id="limparConcluidas" class="limparConcluidas"> Limpar Concluídas</button>
                </div>
            </section>




                <script src="script.js"></script> 
        </main>

        </body>
</html>
